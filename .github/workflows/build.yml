name: GitHub Actions Build

on: [push, pull_request]

env:
  BUILD_TYPE: Release

jobs:
  build:
    name: ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    defaults:
      run:
        shell: ${{ matrix.platform.shell }}

    strategy:
      fail-fast: false
      matrix:
        platform:
        - { name: Windows-mingw-x86_64, os: windows-latest,   artifact: 'ags-mingw-x86_64', shell: 'msys2 {0}', runbin: "./ags",      bindir: "",        cmakecmd: "cmake", buildtools: 1, buildtests: 1, msystem: mingw64, msys-env: mingw-w64-x86_64 }
        - { name: Windows-mingw-arm64,  os: windows-11-arm,   artifact: 'ags-mingw-arm64',  shell: 'msys2 {0}', runbin: "./ags",      bindir: "",        cmakecmd: "cmake", buildtools: 1, buildtests: 1, msystem: clangarm64, msys-env: mingw-w64-clang-aarch64 }
        - { name: Windows,              os: windows-latest,   artifact: 'ags-windows',      shell: cmd,         runbin: ".\\ags.exe", bindir: "Release", cmakecmd: "cmake", buildtools: 1, buildtests: 1 }
        - { name: Ubuntu-x86_64,        os: ubuntu-latest,    artifact: 'ags-linux-x86_64', shell: sh,          runbin: "./ags",      bindir: ""       , cmakecmd: "cmake", buildtools: 1, buildtests: 1 }
        - { name: Ubuntu-Arm64,         os: ubuntu-22.04-arm, artifact: 'ags-linux-Arm64',  shell: sh,          runbin: "./ags",      bindir: ""       , cmakecmd: "cmake", buildtools: 1, buildtests: 1 }
        - { name: macOS,                os: macos-latest,     artifact: 'ags-macos',        shell: sh,          runbin: "./ags",      bindir: ""       , cmakecmd: "cmake", buildtools: 1, buildtests: 1 }
        - { name: Emscripten,           os: ubuntu-latest,    artifact: 'ags-emscripten',   shell: sh,          runbin: "node",       bindir: ""       , cmakecmd: "emcmake cmake", buildtools: 0, buildtests: 0 }

    steps:
    - name: Set up MSYS2
      if: matrix.platform.shell == 'msys2 {0}'
      uses: msys2/setup-msys2@v2
      with:
        msystem: ${{ matrix.platform.msystem }}
        install: >-
          ${{ matrix.platform.msys-env }}-cc
          ${{ matrix.platform.msys-env }}-cmake
          ${{ matrix.platform.msys-env }}-ninja
          ${{ matrix.platform.msys-env }}-perl
          ${{ matrix.platform.msys-env }}-python-pip
          ${{ matrix.platform.msys-env }}-pkg-config
          ${{ matrix.platform.msys-env }}-clang-tools-extra
          unzip

    - name: Set up Tappy
      run: pip install tap.py

    - uses: actions/checkout@v4

    - uses: mymindstorm/setup-emsdk@v14
      if: ${{ matrix.platform.name == 'Emscripten' }}
      with:
        version: 3.1.74

    - name: Install Chrome (Emscripten only)
      if: ${{ matrix.platform.name == 'Emscripten' }}
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: Configure CMake
      run: |
        cmake --version
        ${{ matrix.platform.cmakecmd }} -S "${{github.workspace}}" -B "${{github.workspace}}/build" -DAGS_BUILD_TOOLS=${{ matrix.platform.buildtools }} -DAGS_TESTS=${{ matrix.platform.buildtests }} -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}

    - name: Build
      run: cmake --build "${{github.workspace}}/build" --config ${{env.BUILD_TYPE}} --parallel 2

    - name: Test (native)
      if: ${{ matrix.platform.name != 'Emscripten' }}
      working-directory: ${{github.workspace}}/build
      run: ctest -C ${{env.BUILD_TYPE}} --output-on-failure

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.platform.artifact }}
        path: |
          ${{github.workspace}}/build/${{env.BUILD_TYPE}}/ags.exe
          ${{github.workspace}}/build/ags
          ${{github.workspace}}/build/ags.exe
          ${{github.workspace}}/build/ags.html
          ${{github.workspace}}/build/ags.wasm
          ${{github.workspace}}/build/ags.js

    - name: Download auto-test
      working-directory: ${{github.workspace}}/build/${{matrix.platform.bindir}}
      run: |
        curl -sLo auto-test.zip https://github.com/adventuregamestudio/ags-test-games/releases/latest/download/ags3-auto-test.zip

    - name: Unzip auto-test
      if: matrix.platform.shell == 'cmd'
      working-directory: ${{github.workspace}}/build/${{matrix.platform.bindir}}
      run: |
        tar -f auto-test.zip -xvzC .
        del auto-test.

    - name: Unzip auto-test
      if: matrix.platform.shell != 'cmd'
      working-directory: ${{github.workspace}}/build/${{matrix.platform.bindir}}
      run: |
        unzip auto-test.zip
        rm auto-test.zip

    - name: Test (Emscripten in headless Chrome)
      if: ${{ matrix.platform.name == 'Emscripten' }}
      run: |
        npx http-server "${{github.workspace}}/build" -p 8080 & SERVER_PID=$!
        sleep 5
        google-chrome --headless --disable-gpu --no-sandbox \
          --remote-debugging-port=9222 \
          http://localhost:8080/ags.html
        sleep 30
        kill $SERVER_PID

    - name: Run auto-test
      if: ${{ matrix.platform.name != 'Emscripten' }}
      working-directory: ${{github.workspace}}/build/${{matrix.platform.bindir}}
      run: |
        ${{matrix.platform.runbin}} --no-message-box --log-stdout=script:info,main:info --user-data-dir . ags3-auto-test.ags

    - name: Check auto-test
      if: ${{ matrix.platform.name != 'Emscripten' }}
      working-directory: ${{github.workspace}}/build/${{matrix.platform.bindir}}
      run: |
        tappy agstest.tap
